{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "galene.roleName" . }}
  labels:
    {{- include "galene.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "galene.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "galene.roleName" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
