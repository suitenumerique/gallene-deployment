replicaCount: 1

image:
  repository: paloys/galene
  pullPolicy: IfNotPresent
  tag: "1.0"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Automount is required by the init container that queries the TURN service IP via kubectl.
  automount: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8443

turn:
  port: 1194

ingress:
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  # The first host is also used as canonicalHost / proxyURL in config.json.
  host: galene.example.com
  paths:
    - path: /
      pathType: ImplementationSpecific
  tls:
    - secretName: galene-tls
      hosts:
        - galene.example.com

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  exec:
    command:
      - /bin/sh
      - -c
      - '[ "$(netstat -nlp | grep galene | wc -l)" -ge 3 ]'
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  exec:
    command:
      - /bin/sh
      - -c
      - '[ "$(netstat -nlp | grep galene | wc -l)" -ge 3 ]'
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Whether or not Galène should run without the frontend
# If set to true, you should probably modify the ingress accordingly
headless: false

# Admin credentials for Galène. Set these via --set or a separate values file;
# if using a secrets operator (e.g. ArgoCD Vault Plugin), inject the values there.
secrets:
  username: ""
  password: ""

# A list of urls that are allowed to forward requests to Galène (put the url of the frontend here!)
allowOrigin: []
